<script>
    const SUPABASE_URL = 'https://gnikermzmvllrnbdlkcm.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_JXSYRQ4d9826aCspBlXbAQ_qdMxZJ-B';
    
    const { createClient } = window.supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    let userGender = 'male';
    let allParticipants = [];

    const maleVerses = [
        { text: "내가 누구를 보내며 누가 우리를 위하여 갈꼬 그 때에 내가 이르되 내가 여기 있나이다 나를 보내소서", ref: "이사야 6:8" },
        { text: "너는 두려워하지 말라 내가 너와 함께 함이라 놀라지 말라 나는 네 하나님이 됨이라 내가 너를 굳세게 하리라 참으로 너를 도와 주리라", ref: "이사야 41:10" },
        { text: "내가 너를 지명하여 불렀나니 너는 내 것이라 네가 물 가운데로 지날 때에 내가 너와 함께 할 것이라", ref: "이사야 43:1-2" },
        { text: "내가 또 너를 이방의 빛으로 삼아 나의 구원을 베풀어서 땅 끝까지 이르게 하리라", ref: "이사야 49:6" }
    ];

    const femaleVerses = [
        { text: "오직 여호와를 앙망하는 자는 새 힘을 얻으리니 독수리가 날개치며 올라감 같을 것이요 걸어가도 피곤하지 아니하리로다", ref: "이사야 40:31" },
        { text: "좋은 소식을 가져오며 평화를 공포하며 구원을 공포하며 네 하나님이 통치하신다 하는 자의 발이 어찌 그리 아름다운고", ref: "이사야 52:7" },
        { text: "주 여호와의 영이 내게 내리셨으니 나를 보내사 가난한 자에게 아름다운 소식을 전하게 하려 하심이라 마음이 상한 자를 고치며 포로 된 자에게 자유를 선포하며", ref: "이사야 61:1" },
        { text: "그는 실로 우리의 질고를 지고 우리의 슬픔을 당하였거늘 그가 찔림은 우리의 허물 때문이요 그가 상함은 우리의 죄악 때문이라", ref: "이사야 53:4-5" },
        { text: "내가 너를 지으며 너를 모태에서부터 도와 주었느니라 나의 종 야곱 내가 택한 여수룬아 두려워하지 말라", ref: "이사야 44:2" },
        { text: "여호와께서 너를 항상 인도하여 메마른 곳에서도 네 영혼을 만족하게 하며 네 뼈를 견고하게 하리니 너는 물 댄 동산 같겠고 물이 끊어지지 아니하는 샘 같을 것이라", ref: "이사야 58:11" },
        { text: "시온이여 두려워하지 말라 네 손을 늘어뜨리지 말라 네 하나님 여호와가 너의 가운데에 계시니 그는 구원을 베푸실 전능자이시라", ref: "이사야 35:4" },
        { text: "그러므로 너희가 기쁨으로 구원의 우물들에서 물을 길으리로다 그 날에 너희가 또 말하기를 여호와께 감사하라 그의 이름을 부르며 그의 행하심을 만국 중에 선포하라", ref: "이사야 12:3-4" }
    ];

    async function loadData() {
        try {
            const { data } = await db.from('dubai_participants').select('*');
            allParticipants = data || [];
        } catch (e) {
            console.error('로드 실패:', e);
        }
    }

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    function setUserGender(g) {
        userGender = g;
        document.getElementById('btnMale').classList.toggle('active', g === 'male');
        document.getElementById('btnFemale').classList.toggle('active', g === 'female');
    }

    function startGacha() {
        const name = document.getElementById('nameInput').value.trim();
        if (!name) { alert('이름을 입력해주세요!'); return; }
        document.getElementById('dispName').textContent = name;
        document.getElementById('dispGender').textContent = userGender === 'male' ? '👨 남자팀' : '👩 여자팀';
        document.getElementById('gachaBtn').disabled = false;
        document.getElementById('resultBox').classList.remove('show');
        document.getElementById('loading').style.display = 'none';
        showPage('gachaPage');
    }

    async function pickVerse() {
        const btn = document.getElementById('gachaBtn');
        const loading = document.getElementById('loading');
        const resultBox = document.getElementById('resultBox');
        const name = document.getElementById('dispName').textContent;

        btn.disabled = true;
        loading.style.display = 'block';
        resultBox.classList.remove('show');

        setTimeout(async () => {
            try {
                const verseList = userGender === 'male' ? maleVerses : femaleVerses;
                const verseCount = {};
                
                allParticipants.filter(p => p.gender === userGender).forEach(p => {
                    verseCount[p.verse] = (verseCount[p.verse] || 0) + 1;
                });

                const available = verseList.filter(v => !verseCount[v.text] || verseCount[v.text] < 2);

                if (available.length === 0) {
                    alert('모든 방이 배정 완료되었습니다!');
                    loading.style.display = 'none';
                    btn.disabled = false;
                    return;
                }

                const picked = available[Math.floor(Math.random() * available.length)];

                const { error } = await db.from('dubai_participants').insert([
                    { name, gender: userGender, verse: picked.text, ref: picked.ref }
                ]);

                if (error) throw error;

                await loadData();
                loading.style.display = 'none';
                document.getElementById('verseCard').innerHTML = 
                    `${picked.text}<div class="verse-ref">${picked.ref}</div>`;
                document.getElementById('msgBox').innerHTML =
                    `<strong>${name}님</strong>과 같은 구절을 뽑은 분이 룸메이트입니다! 이사야의 말씀으로 함께 준비해요 🙏`;
                resultBox.classList.add('show');
                btn.disabled = true;
            } catch (error) {
                alert('저장 실패: ' + error.message);
                loading.style.display = 'none';
                btn.disabled = false;
            }
        }, 1000);
    }

    async function showAdminPage() {
        await loadData();
        updateAdmin();
        showPage('adminPage');
    }

    function updateAdmin() {
        const males = allParticipants.filter(p => p.gender === 'male');
        const females = allParticipants.filter(p => p.gender === 'female');

        const malesByVerse = {};
        males.forEach(p => {
            if (!malesByVerse[p.verse]) malesByVerse[p.verse] = [];
            malesByVerse[p.verse].push(p);
        });

        const femalesByVerse = {};
        females.forEach(p => {
            if (!femalesByVerse[p.verse]) femalesByVerse[p.verse] = [];
            femalesByVerse[p.verse].push(p);
        });

        const maleDone = Object.values(malesByVerse).filter(r => r.length === 2).length;
        const femaleDone = Object.values(femalesByVerse).filter(r => r.length === 2).length;

        document.getElementById('stMale').textContent = males.length;
        document.getElementById('stFemale').textContent = females.length;
        document.getElementById('stMaleRoom').textContent = maleDone;
        document.getElementById('stFemaleRoom').textContent = femaleDone;

        document.getElementById('maleRooms').innerHTML = renderRooms(malesByVerse, 4, '남자방');
        document.getElementById('femaleRooms').innerHTML = renderRooms(femalesByVerse, 8, '여자방');
    }

    function renderRooms(byVerse, total, label) {
        let html = '';
        let num = 1;

        Object.entries(byVerse).forEach(([verse, members]) => {
            if (members.length === 2) {
                html += `<div class="room-card"><div class="room-num">🛏️ ${label} ${num}</div>${members.map(m => `<div class="member">👤 ${m.name}</div>`).join('')}<div class="verse-tiny">${verse}</div></div>`;
                num++;
            }
        });

        Object.entries(byVerse).forEach(([verse, members]) => {
            if (members.length === 1) {
                html += `<div class="room-card pending"><div class="room-num pending-lbl">⏳ ${label} ${num} (대기 중)</div>${members.map(m => `<div class="member">👤 ${m.name}</div>`).join('')}<div class="waiting">파트너를 기다리는 중...</div><div class="verse-tiny">${verse}</div></div>`;
                num++;
            }
        });

        for (let i = num; i <= total; i++) {
            html += `<div class="room-card empty"><div class="room-num empty-lbl">🛏️ ${label} ${i}</div><div class="waiting">대기 중...</div></div>`;
        }

        return html;
    }

    function backToInput() { showPage('inputPage'); }
    async function refreshData() { await loadData(); updateAdmin(); }
    async function resetData() {
        const password = prompt('초기화 비밀번호를 입력하세요:');
        
        if (password === null) return; // 취소 클릭
        if (password !== '8740') {
            alert('❌ 비밀번호가 틀렸습니다!');
            return;
        }
        
        if (confirm('정말 모든 데이터를 초기화할까요?\n이 작업은 되돌릴 수 없습니다.')) {
            try {
                await db.from('dubai_participants').delete().neq('id', 0);
                allParticipants = [];
                updateAdmin();
                alert('✅ 초기화 완료되었습니다!');
            } catch (e) {
                alert('초기화 실패: ' + e.message);
            }
        }
    }

    (async () => {
        await loadData();
        db.channel('changes').on('postgres_changes', { event: '*', schema: 'public', table: 'dubai_participants' }, () => {
            loadData();
            if (document.getElementById('adminPage').classList.contains('active')) updateAdmin();
        }).subscribe();
    })();
</script>
